spring.application.name=E-Commerce
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Istanbul

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/canantika?characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mehmet619}
spring.datasource.driver-class-name=org.postgresql.Driver

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.file.name=logs/app.log
logging.level.root=INFO

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-key}
jwt.expirationMs=1800000
jwt.refreshExpirationMs=86400000

# Redis (Cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none

# OAuth2 (Google)
# Bu degerleri Google Cloud Console'dan alip buraya eklemelisiniz.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,address,phone
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# File upload - maksimum dosya boyutu
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Resend Email Configuration
resend.api.key=${RESEND_API_KEY:re_placeholder}
resend.from.email=onboarding@resend.dev

# Rate limiting (IP başına; sliding window)
# ─── Rate Limit (Merkezi Yönetim) ──────────────────────────────────
# Hiçbir bucket'a uymayan istekler için global limit (IP başına)
rate-limit.global-max-requests=60
rate-limit.global-window-minutes=1

# Bucket tanımları — sıra önemli, ilk eşleşen uygulanır
# Auth: brute force koruması
rate-limit.buckets[0].name=auth
rate-limit.buckets[0].path-prefix=/v1/auth/
rate-limit.buckets[0].max-requests=5
rate-limit.buckets[0].window-minutes=1
rate-limit.buckets[0].message=Çok fazla deneme. Lütfen daha sonra tekrar deneyin.

# Payment: ödeme spam koruması
rate-limit.buckets[1].name=payment
rate-limit.buckets[1].path-prefix=/v1/payment/
rate-limit.buckets[1].max-requests=10
rate-limit.buckets[1].window-minutes=1
rate-limit.buckets[1].message=Ödeme isteği limiti aşıldı. Lütfen kısa süre sonra tekrar deneyin.

# API genel: tüm /v1/ endpointleri (auth ve payment hariç — onlar üstte yakalanır)
rate-limit.buckets[2].name=api
rate-limit.buckets[2].path-prefix=/v1/
rate-limit.buckets[2].max-requests=120
rate-limit.buckets[2].window-minutes=1
rate-limit.buckets[2].message=İstek limiti aşıldı. Lütfen biraz bekleyip tekrar deneyin.

# Base URL - şifre sıfırlama linki için (production'da APP_BASE_URL env ile verin)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# CORS - production'da frontend domain (virgülle ayırın)
# app.cors.allowed-origins=https://your-frontend.com,https://www.your-frontend.com

# Sipariş otomatik iptal süresi (saat) — PENDING siparişler bu süre sonunda iptal edilir
app.order.expiry-hours=${ORDER_EXPIRY_HOURS:24}

# Admin şifresi (dev ortamı için, production'da APP_ADMIN_PASSWORD env ile verin)
app.admin.password=${APP_ADMIN_PASSWORD:admin123}

# Stok alarm eşiği — bu sayının altına düşen ürünler için admin'e bildirim gider
app.stock.alert-threshold=${STOCK_ALERT_THRESHOLD:5}

# Admin kullanıcı ID — bildirimler bu kullanıcıya gider
app.admin.user-id=${ADMIN_USER_ID:1}

